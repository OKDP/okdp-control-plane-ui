<div class="group-container">
    <p-toast></p-toast>
    <p-confirmDialog styleClass="db-confirm-dialog" [style]="{width: '400px'}" acceptButtonStyleClass="p-button-danger"
        rejectButtonStyleClass="p-button-text">
    </p-confirmDialog>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="left-group">
            <h1>Groups</h1>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input type="text" pInputText placeholder="Filter groups..."
                    (input)="dt.filterGlobal($any($event.target).value, 'contains')" />
            </p-iconfield>
        </div>

        <p-button label="Create group" (onClick)="openNew()" styleClass="create-btn">
        </p-button>
    </div>

    <!-- Data Table -->
    <div class="table-wrapper">
        <p-table #dt [value]="groups()" [loading]="loading()" [globalFilterFields]="['name', 'description']"
            styleClass="minimal-table">

            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 30%">Name</th>
                    <th style="width: 55%">Description</th>
                    <th style="width: 15%"></th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-group>
                <tr class="group-row">
                    <td>
                        <span class="group-name">{{ group.name }}</span>
                    </td>
                    <td class="description-cell">
                        {{ group.description || '-' }}
                    </td>
                    <td style="text-align: right">
                        <div class="actions">
                            <p-button icon="pi pi-ellipsis-v" [text]="true" [rounded]="true"
                                (onClick)="menu.toggle($event); selectedGroup = group">
                            </p-button>
                            <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="3" class="empty-message">
                        No groups found.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Create/Edit Dialog -->
    <p-dialog [header]="isEditMode ? 'Edit group' : 'Create new group'" [(visible)]="groupDialog" [modal]="true"
        [draggable]="false" [resizable]="false" [style]="{ width: '450px' }" styleClass="db-dialog" [closable]="true">

        <div class="dialog-content">
            <div class="field">
                <label for="name">Group name</label>
                <input pInputText id="name" [(ngModel)]="group.name" class="w-full dialog-input"
                    placeholder="e.g., developers" [disabled]="isEditMode" />
                <small class="p-error" *ngIf="submitted && !group.name">Group name is required.</small>
            </div>

            <div class="field">
                <label for="description">Description <span class="optional">(optional)</span></label>
                <textarea pInputTextarea id="description" [(ngModel)]="group.description" rows="4"
                    class="w-full dialog-input" placeholder="Describe the purpose of this group..."></textarea>
            </div>
        </div>

        <ng-template pTemplate="footer">
            <div class="dialog-actions">
                <p-button severity="secondary" [outlined]="true" label="Cancel" (onClick)="hideDialog()"></p-button>
                <p-button severity="primary" [disabled]="!group.name" (onClick)="saveGroup()" [label]="isEditMode ? 'Save' : 'Create'"></p-button>
            </div>
        </ng-template>
    </p-dialog>
</div>
