<div class="admin-shell">
  <!-- Header unifié -->
  <header class="main-header">
    <div class="header-left">
      <button class="toggle-btn" (click)="toggleSidebar()" [title]="sidebarCollapsed() ? 'Expand' : 'Collapse'"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'">
        <i [class]="sidebarCollapsed() ? 'pi pi-angle-right' : 'pi pi-angle-left'"></i>
      </button>
      <div class="logo-container">
        <img src="/images/okdp-notext.svg" alt="okdp" class="logo" />
        <div class="logo-text">
          <span class="logo-title">okdp</span>
          <span class="logo-subtitle">console</span>
        </div>
      </div>
    </div>

    <div class="header-center">
    </div>

    <div class="header-right">
      <a [href]="githubUrl" target="_blank" class="topbar-btn" title="GitHub">
        <i class="pi pi-github"></i>
      </a>

      <div class="user-card" (click)="menu.toggle($event)" tabindex="0" aria-label="User menu" role="button"
        (keydown.enter)="menu.toggle($event)">
        <p-avatar [label]="initials()" shape="circle" size="normal"></p-avatar>
        <div class="user-info">
          <span class="user-name">{{ displayName() }}</span>
        </div>
        <i class="pi pi-angle-down"></i>
      </div>
      <p-menu #menu [model]="profileMenu" [popup]="true"></p-menu>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed()">

    <nav class="nav">
      <a class="nav-link" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        [title]="sidebarCollapsed() ? 'Home' : ''">
        <i class="pi pi-home"></i>
        <span>Home</span>
      </a>

      <a class="nav-link" routerLink="/admin/projects" routerLinkActive="active"
        [title]="sidebarCollapsed() ? 'Projects' : ''">
        <i class="pi pi-th-large"></i>
        <span>Projects</span>
      </a>

      <a class="nav-link" routerLink="/admin/identity" routerLinkActive="active"
        [title]="sidebarCollapsed() ? 'Identity' : ''">
        <i class="pi pi-users"></i>
        <span>Identity</span>
      </a>
    </nav>
  </aside>

  <!-- Main layout -->
  <div class="main-layout">

    <!-- Content -->
    <main class="main-content">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
      <div class="footer-left">
        <span>© 2026 OKDP. All rights reserved.</span>
      </div>
      <div class="footer-right">
        <span>v1.0.0</span>
      </div>
    </footer>
  </div>
</div>
