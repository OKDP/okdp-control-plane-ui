server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Immutable hashed assets produced by Vite
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # An ingress is expected to route /api to the control plane upstream;
    # fail loudly instead of answering API calls with the SPA shell.
    location /api/ {
        return 404;
    }

    # Always revalidate the HTML entry point so redeploys never strand
    # browsers on a heuristically-cached index.html with stale asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
