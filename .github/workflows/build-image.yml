name: build-image

# Build the image and publish it to the OKDP registry on quay.io.
# Triggered when a release is published (cut by release-please), so the
# semver tag is pushed once per release and never overwritten by
# intermediate commits. Manual runs use the current manifest version.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # upload the GitHub Actions build cache
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          VERSION=$(jq -r '.["."] // "0.1.0"' .release-please-manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_ROBOT_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: quay.io/okdp/images/okdp-ui:${{ steps.vars.outputs.version }}
          labels: |
            org.opencontainers.image.title=okdp-ui
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
