name: publish-chart

# Package the Helm chart and publish it to the OKDP registry (OCI):
# oci://quay.io/okdp/charts/<chart-name>. Triggered on published releases
# (cut by release-please) so the chart version matches the released version.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          VERSION=$(jq -r '.["."] // "0.1.0"' .release-please-manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: azure/setup-helm@v4
      - name: Package and push chart
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_ROBOT_TOKEN: ${{ secrets.REGISTRY_ROBOT_TOKEN }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          echo "$REGISTRY_ROBOT_TOKEN" | helm registry login quay.io -u "$REGISTRY_USERNAME" --password-stdin
          helm package chart --version "$VERSION" --app-version "$VERSION"
          helm push "okdp-ui-$VERSION.tgz" oci://quay.io/okdp/charts
