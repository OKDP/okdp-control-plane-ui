apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "okdp-ui.fullname" . }}
  labels:
    {{- include "okdp-ui.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API calls go to the in-cluster control-plane Service. The console
          # image serves only the static bundle (its nginx returns 404 on /api),
          # so /api must be routed to the backend here, at the ingress.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.service }}
                port:
                  number: {{ .Values.backend.port }}
          # Everything else is the single-page app.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "okdp-ui.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
