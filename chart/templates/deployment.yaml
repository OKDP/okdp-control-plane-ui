apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "okdp-ui.fullname" . }}
  labels:
    {{- include "okdp-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "okdp-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "okdp-ui.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          # The image serves only the static bundle (its nginx returns 404 on
          # /api); the ingress routes /api to the control plane. Probe the SPA
          # entry point to confirm nginx is up and serving.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
